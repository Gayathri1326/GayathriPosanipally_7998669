<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        td {
            padding: 15px;
        }

        .event-img {
            width: 220px;
            height: 150px;
            border: 4px solid black;
            border-radius: 10px;
        }

        .caption {
            margin-top: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>

        <caption>Community Events Gallery</caption>

        <!-- Row 1 -->
        <tr>

            <td>
                <img 
                    src="https://images.unsplash.com/photo-1506157786151-b8491531f063"
                    alt="Music Festival"
                    title="Annual Music Festival"
                    class="event-img">

                <div class="caption">
                    Music Festival 2026
                </div>
            </td>

            <td>
                <img 
                    src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac"
                    alt="Food Fair"
                    title="Local Food Fair"
                    class="event-img">

                <div class="caption">
                    Community Food Fair
                </div>
            </td>

            <td>
                <img 
                    src="https://images.unsplash.com/photo-1511578314322-379afb476865"
                    alt="Sports Meet"
                    title="Annual Sports Meet"
                    class="event-img">

                <div class="caption">
                    Sports Meet Event
                </div>
            </td>

        </tr>

        <!-- Row 2 -->
        <tr>

            <td>
                <img 
                    src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30"
                    alt="Concert Night"
                    title="Live Concert Night"
                    class="event-img">

                <div class="caption">
                    Live Concert Night
                </div>
            </td>

            <td>
                <img 
                    src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205"
                    alt="Art Exhibition"
                    title="Art Exhibition"
                    class="event-img">

                <div class="caption">
                    Art Exhibition
                </div>
            </td>

            <td>
                <img 
                    src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                    alt="Tree Plantation"
                    title="Tree Plantation Drive"
                    class="event-img">

                <div class="caption">
                    Tree Plantation Drive
                </div>
            </td>

        </tr>

    </table>

</body>
</html>
