<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Preferences</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Preferred Event Type</h2>

        <!-- Event Selection -->
        <select id="eventType" onchange="savePreference()">
            <option value="">Select Event</option>
            <option value="Music Festival">Music Festival</option>
            <option value="Sports Meet">Sports Meet</option>
            <option value="Art Exhibition">Art Exhibition</option>
            <option value="Food Fair">Food Fair</option>
        </select>

        <!-- Clear Button -->
        <button onclick="clearPreferences()">
            Clear Preferences
        </button>

        <p id="message"></p>

    </div>

    <script>

        // Retrieve saved preference on page load
        window.onload = function () {

            let savedEvent =
                localStorage.getItem("preferredEvent");

            if (savedEvent) {
                document.getElementById("eventType").value =
                    savedEvent;

                document.getElementById("message").innerHTML =
                    "Saved preference loaded!";
            }
        };

        // Save preference
        function savePreference() {

            let eventType =
                document.getElementById("eventType").value;

            // Store in localStorage
            localStorage.setItem(
                "preferredEvent",
                eventType
            );

            // Example sessionStorage usage
            sessionStorage.setItem(
                "sessionEvent",
                eventType
            );

            document.getElementById("message").innerHTML =
                "Preference saved successfully!";
        }

        // Clear storage
        function clearPreferences() {

            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("eventType").value = "";

            document.getElementById("message").innerHTML =
                "Preferences cleared!";
        }

    </script>

</body>
</html>
