<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <!-- Internal CSS -->
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 3px;
        }
    </style>
</head>
<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1>Welcome Back, User!</h1>
        <p class="highlight">
            Enjoy your personalized dashboard experience.
        </p>

        <p>
            Today's 
            <span style="color: red; font-weight: bold;">
                Special Offer: 50% OFF
            </span>
            on premium membership!
        </p>
    </div>

    <!-- Additional Highlight Example -->
    <p class="highlight">
        Important Notice: New events have been added.
    </p>

</body>
</html>
