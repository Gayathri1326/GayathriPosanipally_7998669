<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.1</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5 text-primary">
        Dashboard
    </h1>

    <div class="row">

        <!-- Card 1 -->
        <div class="col-md-3 mb-3">
            <div class="bg-primary text-white p-4 rounded text-center">
                <h3>Users</h3>
                <h2>150</h2>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-3 mb-3">
            <div class="bg-success text-white p-4 rounded text-center">
                <h3>Sales</h3>
                <h2>320</h2>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-3 mb-3">
            <div class="bg-warning text-dark p-4 rounded text-center">
                <h3>Orders</h3>
                <h2>89</h2>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="col-md-3 mb-3">
            <div class="bg-danger text-white p-4 rounded text-center">
                <h3>Issues</h3>
                <h2>12</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
