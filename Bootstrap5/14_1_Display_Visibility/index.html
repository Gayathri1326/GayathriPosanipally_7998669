<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 14.1</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Display & Visibility Utilities
    </h1>

    <!-- Hidden on all screens -->
    <div class="d-none bg-danger text-white p-3 mb-3">
        This section is hidden on all screen sizes.
    </div>

    <!-- Hidden on mobile, visible on medium and larger -->
    <div class="d-none d-md-block bg-success text-white p-3 mb-3">
        Visible on Medium and Large screens only.
    </div>

    <!-- Visible only on large screens and above -->
    <div class="d-none d-lg-flex bg-primary text-white p-3">
        Visible on Large screens only.
    </div>

</div>

</body>
</html>
