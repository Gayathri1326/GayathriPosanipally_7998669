<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 7.1</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <div class="container mt-5">

        <!-- Display Heading -->
        <h1 class="display-1 text-primary">
            Bootstrap Typography
        </h1>

        <!-- Lead Paragraph -->
        <p class="lead">
            This is a lead paragraph using Bootstrap.
        </p>

        <!-- Muted Text -->
        <p class="text-muted">
            This text is muted.
        </p>

        <!-- Bold Text -->
        <p class="fw-bold">
            This text is bold.
        </p>

        <!-- Normal Paragraph -->
        <p>
            Bootstrap provides many typography utility classes.
        </p>

    </div>

</body>
</html>
