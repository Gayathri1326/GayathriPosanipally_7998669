<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">
        Pricing Plans
    </h1>

    <div class="row">

        <!-- Basic Plan -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 text-center">
                <h3>Basic</h3>
                <h2 class="my-3">₹499</h2>
                <p>1 User</p>
                <p>10 GB Storage</p>
                <button class="btn btn-primary mt-3">
                    Choose Plan
                </button>
            </div>
        </div>

        <!-- Standard Plan -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 text-center">
                <h3>Standard</h3>
                <h2 class="my-3">₹999</h2>
                <p>5 Users</p>
                <p>50 GB Storage</p>
                <button class="btn btn-success mt-3">
                    Choose Plan
                </button>
            </div>
        </div>

        <!-- Premium Plan -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 text-center">
                <h3>Premium</h3>
                <h2 class="my-3">₹1499</h2>
                <p>Unlimited Users</p>
                <p>100 GB Storage</p>
                <button class="btn btn-danger mt-3">
                    Choose Plan
                </button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
